<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c-gradient-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7B9FB8" />
      <stop offset="100%" stop-color="#2C4A5E" />
    </linearGradient>

    <filter id="shadow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#shadow-blue)">
    <circle cx="100" cy="100" r="90" stroke="url(#c-gradient-blue)" stroke-width="12" fill="none" />

    <path
      d="M 135 45 A 65 65 0 1 0 135 155"
      stroke="url(#c-gradient-blue)"
      stroke-width="40"
      stroke-linecap="round"
      fill="none"
    />
  </g>

  <path
    d="M 130 50 A 60 60 0 0 0 50 100"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="6"
    fill="none"
    stroke-linecap="round"
  />
</svg>
